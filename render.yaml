services:
  - type: web
    name: notes-app-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: notes-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: notes-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: notes-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: notes-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: notes-db
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: notes-db
    plan: free
    databaseName: notes_app
